name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '28.1'
          - '29.4'
          - '30.1'
    steps:
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - uses: actions/checkout@v4

      - name: Byte-compile
        run: |
          emacs -Q --batch \
            --eval '(setq byte-compile-error-on-warn t)' \
            -f batch-byte-compile context-clues.el

      - name: Run tests
        run: |
          emacs -Q --batch \
            -l test/context-clues-tests.el \
            -f ert-run-tests-batch-and-exit
